name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  python-and-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/arbcore-rs

      - run: python -m pip install --upgrade pip setuptools wheel
      - run: pip install -e '.[dev]' --no-build-isolation
      - run: ruff check .
      - run: pytest
      - run: PYTHONPATH=src python scripts/validate_repository.py
      - run: PYTHONPATH=src python scripts/validate_documented_commands.py
      - run: PYTHONPATH=src python scripts/validate_golden_fixtures.py
      - run: PYTHONPATH=src python scripts/validate_all.py --include-rust
      - run: PYTHONPATH=src python scripts/release_readiness.py --json
      - run: cargo test --manifest-path rust/arbcore-rs/Cargo.toml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit --strict .
      - uses: gitleaks/gitleaks-action@v2
        with:
          version: "v8.18.0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t defi-arbitrage-core:ci .

      - name: Docker smoke test
        run: docker run --rm --entrypoint python defi-arbitrage-core:ci -c "import sys; print(sys.version)"
